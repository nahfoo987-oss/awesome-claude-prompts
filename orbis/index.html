// ── Crypto ────────────────────────────────────────────────────────────────────
const STORE_KEY = 'orbis_v3';
async function deriveKey() {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode('orbis-default'), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('orbis-salt-2024'),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function save(data) {
  try {
    const key = await deriveKey(), iv = crypto.getRandomValues(new Uint8Array(12)), enc = new TextEncoder();
    const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(JSON.stringify(data)));
    const buf = new Uint8Array(iv.length+ct.byteLength); buf.set(iv); buf.set(new Uint8Array(ct),iv.length);
    localStorage.setItem(STORE_KEY, btoa(String.fromCharCode(...buf)));
  } catch {}
}
async function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY); if (!raw) return null;
    const key = await deriveKey(), buf = Uint8Array.from(atob(raw),c=>c.charCodeAt(0));
    const dec = await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)},key,buf.slice(12));
    return JSON.parse(new TextDecoder().decode(dec));
  } catch { return null; }
}

const Ctx = createContext(null);

function kw(text) {
  const stop = new Set(['the','a','an','is','in','it','of','to','and','or','for','on','at','by','with','that','this','was','are','be','from','as']);
  return [...new Set(text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>4&&!stop.has(w)))].slice(0,6);
}

function reducer(s, a) {
  switch(a.type) {
    case 'NAV':    return {...s, module:a.v};
    case 'BOOT':   return {...s, bootDone:true};
    case 'KEYS':   return {...s, apiKeys:{...s.apiKeys,...a.v}};
    case 'MOUSE':  return {...s, mouse:a.v};
    case 'LOAD':   return {...s, ...a.v};

    case 'ADD_NOTE': {
      const n={id:Date.now(),title:a.title,body:'',updated:Date.now()};
      return {...s, notes:[...s.notes,n], graphNodes:[...s.graphNodes,{id:n.id,label:a.title,updated:Date.now(),size:6}]};
    }
    case 'UPD_NOTE': {
      const notes=s.notes.map(n=>n.id===a.id?{...n,...a.v,updated:Date.now()}:n);
      const note=notes.find(n=>n.id===a.id);
      let gn=s.graphNodes.map(nd=>nd.id===a.id?{...nd,label:note.title,updated:Date.now()}:nd);
      let gl=s.graphLinks;
      if(a.v.body) kw(a.v.body).forEach(w=>{
        const kid=`kw_${w}`;
        if(!gn.find(n=>n.id===kid)) gn=[...gn,{id:kid,label:w,type:'keyword',updated:Date.now(),size:4}];
        if(!gl.find(l=>l.source===a.id&&l.target===kid)) gl=[...gl,{source:a.id,target:kid}];
      });
      return {...s,notes,graphNodes:gn,graphLinks:gl};
    }
    case 'DEL_NOTE':
      return {...s,notes:s.notes.filter(n=>n.id!==a.id),graphNodes:s.graphNodes.filter(n=>n.id!==a.id),graphLinks:s.graphLinks.filter(l=>l.source!==a.id&&l.target!==a.id)};

    case 'ADD_J':   return {...s,journals:[...s.journals,{id:Date.now(),date:a.date,body:'',mood:3,reflection:''}]};
    case 'UPD_J':   return {...s,journals:s.journals.map(j=>j.id===a.id?{...j,...a.v}:j)};
    case 'DEL_J':   return {...s,journals:s.journals.filter(j=>j.id!==a.id)};

    case 'ADD_G':   return {...s,goals:[...s.goals,{id:Date.now(),title:a.title,desc:a.desc||'',status:'todo',progress:0,milestones:[]}]};
    case 'UPD_G':   return {...s,goals:s.goals.map(g=>g.id===a.id?{...g,...a.v}:g)};
    case 'DEL_G':   return {...s,goals:s.goals.filter(g=>g.id!==a.id)};
    case 'ADD_M':   return {...s,goals:s.goals.map(g=>g.id===a.gid?{...g,milestones:[...g.milestones,{id:Date.now(),text:a.text,done:false}]}:g)};
    case 'TOG_M': {
      const goals=s.goals.map(g=>{
        if(g.id!==a.gid) return g;
        const ms=g.milestones.map(m=>m.id===a.mid?{...m,done:!m.done}:m);
        return {...g,milestones:ms,progress:ms.length?Math.round(ms.filter(m=>m.done).length/ms.length*100):0};
      });
      return {...s,goals};
    }
    case 'DEL_M':   return {...s,goals:s.goals.map(g=>g.id===a.gid?{...g,milestones:g.milestones.filter(m=>m.id!==a.mid)}:g)};

    case 'ADD_AGENT':   return {...s,customAgents:[...s.customAgents,a.agent]};
    case 'AGENT_MSG': {
      const prev=s.agentMessages[a.aid]||[];
      return {...s,agentMessages:{...s.agentMessages,[a.aid]:[...prev,a.msg]}};
    }
    case 'CLEAR_AGENT': {
      const m={...s.agentMessages}; delete m[a.aid]; return {...s,agentMessages:m};
    }
    case 'ADD_SYNTH':  return {...s,synthHistory:[a.v,...s.synthHistory].slice(0,30)};
    case 'ADD_MEMORY': return {...s,memories:[a.v,...s.memories].slice(0,10)};
    case 'DEL_MEMORY': return {...s,memories:s.memories.filter((_,i)=>i!==a.i)};
    default: return s;
  }
}

function Provider({children}) {
  const [s,d]=useReducer(reducer,init);
  useEffect(()=>{ window.__d=d; },[d]);
  useEffect(()=>{
    if(!s.bootDone) return;
    save({notes:s.notes,journals:s.journals,goals:s.goals,customAgents:s.customAgents,agentMessages:s.agentMessages,synthHistory:s.synthHistory,graphNodes:s.graphNodes,graphLinks:s.graphLinks,memories:s.memories});
  },[s.notes,s.journals,s.goals,s.customAgents,s.agentMessages,s.synthHistory,s.graphNodes,s.graphLinks,s.memories,s.bootDone]);
  useEffect(()=>{ load().then(v=>v&&d({type:'LOAD',v})); },[]);
  return <Ctx.Provider value={{s,d}}>{children}</Ctx.Provider>;
}

// ── Neural Particles ──────────────────────────────────────────────────────────
function NeuralParticles() {
  const ref=useRef(); const raf=useRef(); const mouse=useRef({x:-9999,y:-9999});
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d');
    const resize=()=>{ c.width=window.innerWidth; c.height=window.innerHeight; };
    resize(); window.addEventListener('resize',resize);
    const N=110;
    const COLORS=['rgba(0,212,255,','rgba(124,58,237,','rgba(0,255,136,'];
    const pts=Array.from({length:N},()=>({
      x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
      vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
      r:Math.random()*1.4+.4,
      ci:Math.floor(Math.random()*3),
    }));
    const onMove=e=>{mouse.current={x:e.clientX,y:e.clientY};};
    window.addEventListener('mousemove',onMove,{passive:true});
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      ctx.strokeStyle='rgba(0,212,255,.025)'; ctx.lineWidth=1;
      for(let x=0;x<c.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();}
      for(let y=0;y<c.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();}
      const mx=mouse.current.x, my=mouse.current.y;
      pts.forEach(p=>{
        const dx=p.x-mx, dy=p.y-my, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<160&&dist>0){const f=(160-dist)/160*.9;p.vx+=(dx/dist)*f;p.vy+=(dy/dist)*f;}
        p.vx*=.97; p.vy*=.97;
        p.vx=Math.max(-1.8,Math.min(1.8,p.vx)); p.vy=Math.max(-1.8,Math.min(1.8,p.vy));
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
        if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
      });
      for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<95){
          ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,212,255,${(1-d/95)*.12})`; ctx.lineWidth=.5; ctx.stroke();
        }
      }
      pts.forEach(p=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=COLORS[p.ci]+'0.55)'; ctx.fill();
      });
      raf.current=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(raf.current);window.removeEventListener('resize',resize);window.removeEventListener('mousemove',onMove);};
  },[]);
  return <canvas ref={ref} style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none'}}/>;
}

// ── Voice Visualizer ──────────────────────────────────────────────────────────
function Viz({active,color='#00d4ff'}) {
  const ref=useRef(); const raf=useRef(); const bars=useRef(Array.from({length:32},()=>0));
  useEffect(()=>{
    const c=ref.current; if(!c) return; const ctx=c.getContext('2d');
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      const bw=c.width/32;
      bars.current.forEach((h,i)=>{
        bars.current[i]+=(((active?Math.random()*.8+.1:.05))-h)*(active?.3:.1);
        const bh=bars.current[i]*c.height, x=i*bw;
        const g=ctx.createLinearGradient(0,c.height,0,c.height-bh);
        g.addColorStop(0,`${color}22`);g.addColorStop(1,color);
        ctx.fillStyle=g;ctx.fillRect(x+1,c.height-bh,bw-2,bh);
      });
      raf.current=requestAnimationFrame(draw);
    };
    draw(); return()=>cancelAnimationFrame(raf.current);
  },[active,color]);
  return <canvas ref={ref} width={260} height={36} style={{width:'100%',height:36,borderRadius:4}}/>;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function* streamClaude(apiKey, prompt, system) {
  const body={model:'claude-opus-4-7',max_tokens:1024,stream:true,messages:[{role:'user',content:prompt}]};
  if(system) body.system=system;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'API error');}
  const reader=res.body.getReader(); const dec=new TextDecoder();
  while(true){
    const {done,value}=await reader.read(); if(done) break;
    for(const line of dec.decode(value).split('\n')){
      if(!line.startsWith('data: ')) continue;
      const data=line.slice(6); if(data==='[DONE]') return;
      try{const p=JSON.parse(data);if(p.type==='content_block_delta'&&p.delta?.text)yield p.delta.text;}catch{}
    }
  }
}
async function claude(key,prompt,system) {
  const body={model:'claude-opus-4-7',max_tokens:800,messages:[{role:'user',content:prompt}]};
  if(system) body.system=system;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json(); if(d.error) throw new Error(d.error.message); return d.content[0].text;
}
async function gpt(key,prompt) {
  const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{Authorization:`Bearer ${key}`,'Content-Type':'application/json'},body:JSON.stringify({model:'gpt-4o',messages:[{role:'user',content:prompt}],max_tokens:1024})});
  const d=await r.json(); if(d.error) throw new Error(d.error.message); return d.choices[0].message.content;
}
async function gemini(key,prompt) {
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
  const d=await r.json(); if(d.error) throw new Error(d.error.message); return d.candidates[0].content.parts[0].text;
}

// ── RAG ───────────────────────────────────────────────────────────────────────
function ragSearch(notes, journals, query) {
  const qw=query.toLowerCase().split(/\s+/).filter(w=>w.length>3);
  if(!qw.length) return {ctx:'',count:0};
  const pool=[
    ...notes.map(n=>({src:'NOTE',title:n.title,body:n.body||'',text:`${n.title} ${n.body}`})),
    ...journals.map(j=>({src:'JOURNAL',title:j.date,body:j.body||'',text:`${j.date} ${j.body}`})),
  ];
  const scored=pool.map(item=>({...item,score:qw.reduce((s,w)=>s+(item.text.toLowerCase().includes(w)?1:0),0)}))
    .filter(i=>i.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
  if(!scored.length) return {ctx:'',count:0};
  const ctx=`\n\n[KNOWLEDGE BASE — ${scored.length} relevant source(s)]\n${scored.map(i=>`[${i.src}] ${i.title}: ${i.body.slice(0,350)}`).join('\n---\n')}\n[END KNOWLEDGE BASE]`;
  return {ctx,count:scored.length};
}

function CommandPalette({onClose}) {
  const {s,d}=use();
  const [q,setQ]=useState(''); const [sel,setSel]=useState(0);
  const baseItems=[
    ...NAVS.map(n=>({type:'nav',label:n.l,icon:n.icon,color:n.c,action:()=>d({type:'NAV',v:n.id})})),
    ...s.notes.map(n=>({type:'note',label:n.title,icon:'▣',color:'#f59e0b',action:()=>{d({type:'NAV',v:'notes'});}})),
    ...s.synthHistory.slice(0,8).map(h=>({type:'history',label:h.q.slice(0,50),icon:'◷',color:'#06b6d4',action:()=>d({type:'NAV',v:'history'})})),
    ...s.memories.map((m,i)=>({type:'memory',label:m,icon:'◈',color:'#a855f7',action:()=>d({type:'NAV',v:'config'})})),
  ];
  const items=q?baseItems.filter(i=>i.label.toLowerCase().includes(q.toLowerCase())):baseItems;
  const go=item=>{item.action();onClose();};
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape'){onClose();return;}
      if(e.key==='ArrowDown'){e.preventDefault();setSel(p=>Math.min(p+1,items.length-1));}
      if(e.key==='ArrowUp'){e.preventDefault();setSel(p=>Math.max(p-1,0));}
      if(e.key==='Enter'&&items[sel]){go(items[sel]);}
    };
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[items,sel]);
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:9000,background:'rgba(0,0,0,.75)',backdropFilter:'blur(10px)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:100,animation:'slide-in .15s ease'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:580,background:'rgba(5,5,22,.98)',border:'1px solid rgba(0,212,255,.3)',borderRadius:12,overflow:'hidden',boxShadow:'0 0 80px rgba(0,212,255,.12),0 24px 60px rgba(0,0,0,.6)'}}>
        <div style={{padding:'13px 18px',borderBottom:'1px solid rgba(0,212,255,.1)',display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'#00d4ff',fontSize:15,fontWeight:700}}>⌘</span>
          <input autoFocus value={q} onChange={e=>{setQ(e.target.value);setSel(0);}} placeholder="Search modules, notes, history, memories..." style={{flex:1,background:'none',border:'none',color:'#e2e8f0',fontSize:14,outline:'none'}}/>
          <span style={{color:'#334155',fontSize:9,border:'1px solid #1e293b',borderRadius:3,padding:'2px 6px'}}>ESC</span>
        </div>
        <div style={{maxHeight:380,overflowY:'auto'}}>
          {items.length===0&&<div style={{color:'#334155',fontSize:12,textAlign:'center',padding:28}}>No results</div>}
          {items.map((item,i)=>(
            <div key={i} onClick={()=>go(item)} style={{padding:'10px 18px',cursor:'pointer',background:i===sel?`${item.color}15`:'transparent',borderLeft:`2px solid ${i===sel?item.color:'transparent'}`,display:'flex',alignItems:'center',gap:10,transition:'background .08s'}}>
              <span style={{color:item.color,fontSize:13}}>{item.icon}</span>
              <span style={{color:i===sel?'#e2e8f0':'#94a3b8',fontSize:13,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</span>
              <span style={{color:'#1e3a5f',fontSize:9,letterSpacing:1}}>{item.type.toUpperCase()}</span>
            </div>
          ))}
        </div>
        <div style={{padding:'7px 18px',borderTop:'1px solid rgba(0,212,255,.06)',display:'flex',gap:16,color:'#1e3a5f',fontSize:9}}>
          <span>↑↓ navigate</span><span>↵ select</span><span>esc close</span>
          <span style={{marginLeft:'auto'}}>{items.length} items</span>
        </div>
      </div>
    </div>
  );
}

// ── ADVISOR ───────────────────────────────────────────────────────────────────
const MODELS={claude:{name:'Claude',c:'#00d4ff',icon:'◈'},gpt:{name:'GPT-4o',c:'#7c3aed',icon:'◎'},gemini:{name:'Gemini',c:'#00ff88',icon:'◇'}};
function conflicts(res) {
  const pairs=[[/\byes\b/i,/\bno\b/i],[/\bshould\b/i,/\bshouldn't\b/i],[/\bincreas/i,/\bdecreas/i],[/\bsimple\b/i,/\bcomplex\b/i],[/\brecommend\b/i,/\bavoid\b/i]];
  const out=[]; const ks=Object.keys(res);
  for(let i=0;i<ks.length;i++) for(let j=i+1;j<ks.length;j++){
    const a=res[ks[i]]||'', b=res[ks[j]]||'';
    pairs.forEach(([pa,pb])=>{if((pa.test(a)&&pb.test(b))||(pa.test(b)&&pb.test(a)))out.push(`${MODELS[ks[i]]?.name} vs ${MODELS[ks[j]]?.name}: divergent on "${pa.source.replace(/\\/g,'')}"`)});
  }
  return [...new Set(out)];
}

function useVoice(onResult) {
  const SR=typeof window!=='undefined'&&(window.SpeechRecognition||window.webkitSpeechRecognition);
  const [listening,setListening]=useState(false);
  const start=useCallback(()=>{
    if(!SR) return;
    const r=new SR(); r.lang='en-US'; r.interimResults=false;
    r.onresult=e=>onResult(e.results[0][0].transcript);
    r.onend=()=>setListening(false);
    r.onerror=()=>setListening(false);
    setListening(true); r.start();
  },[onResult]);
  return {listening,start,supported:!!SR};
}

function Advisor() {
  const {s,d}=use();
  const [q,setQ]=useState('');
  const [texts,setTexts]=useState({claude:'',gpt:'',gemini:''});
  const [loading,setLoading]=useState({claude:false,gpt:false,gemini:false});
  const [streaming,setStreaming]=useState({claude:false,gpt:false,gemini:false});
  const [errs,setErrs]=useState({});
  const [done,setDone]=useState(false);
  const [ragInfo,setRagInfo]=useState({count:0,active:false});
  const hasKey=s.apiKeys.claude||s.apiKeys.gpt||s.apiKeys.gemini;
  const {listening,start,supported}=useVoice(t=>setQ(p=>p?p+' '+t:t));

  const run=async()=>{
    if(!q.trim()||!hasKey) return;
    setTexts({claude:'',gpt:'',gemini:''}); setErrs({}); setDone(false);
    const {ctx,count}=ragSearch(s.notes,s.journals,q);
    setRagInfo({count,active:count>0});
    const memCtx=s.memories.length?`\n\n[ORBIS MEMORY — previously learned]\n${s.memories.slice(0,5).map(m=>`• ${m}`).join('\n')}`:'';
    const fullPrompt=q+ctx+memCtx;
    const results={};
    const promises=[];

    if(s.apiKeys.claude){
      promises.push((async()=>{
        setLoading(p=>({...p,claude:true})); setStreaming(p=>({...p,claude:true}));
        try{
          let text='';
          for await(const chunk of streamClaude(s.apiKeys.claude,fullPrompt,ORBIS_SYSTEM)){
            text+=chunk; setTexts(p=>({...p,claude:text}));
          }
          results.claude=text;
        }catch(e){setErrs(p=>({...p,claude:e.message}));}
        finally{setStreaming(p=>({...p,claude:false}));setLoading(p=>({...p,claude:false}));}
      })());
    }
    if(s.apiKeys.gpt){
      promises.push((async()=>{
        setLoading(p=>({...p,gpt:true}));
        try{const t=await gpt(s.apiKeys.gpt,fullPrompt);setTexts(p=>({...p,gpt:t}));results.gpt=t;}
        catch(e){setErrs(p=>({...p,gpt:e.message}));}
        finally{setLoading(p=>({...p,gpt:false}));}
      })());
    }
    if(s.apiKeys.gemini){
      promises.push((async()=>{
        setLoading(p=>({...p,gemini:true}));
        try{const t=await gemini(s.apiKeys.gemini,fullPrompt);setTexts(p=>({...p,gemini:t}));results.gemini=t;}
        catch(e){setErrs(p=>({...p,gemini:e.message}));}
        finally{setLoading(p=>({...p,gemini:false}));}
      })());
    }
    await Promise.all(promises);
    setDone(true);
    d({type:'ADD_SYNTH',v:{q,responses:results,rag:count>0,ts:Date.now()}});
    if(s.apiKeys.claude&&results.claude&&s.memories.length<10){
      try{
        const insight=await claude(s.apiKeys.claude,`Extract one key factual insight (max 15 words) worth remembering from:\n"${results.claude.slice(0,500)}"\nRespond with ONLY the insight.`);
        if(insight&&insight.length<150) d({type:'ADD_MEMORY',v:insight.trim()});
      }catch{}
    }
  };

  const cf=done?conflicts(texts):[];
  const score=Math.max(0,100-cf.length*15);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{color:'#7c3aed',fontSize:12,letterSpacing:2,fontWeight:700}}>◈ MULTI-AI ADVISOR</span>
        {ragInfo.active&&<span style={{background:'rgba(0,255,136,.12)',color:'#00ff88',fontSize:9,borderRadius:4,padding:'2px 7px',letterSpacing:1}}>RAG · {ragInfo.count} source{ragInfo.count>1?'s':''}</span>}
        {s.memories.length>0&&<span style={{background:'rgba(168,85,247,.12)',color:'#a855f7',fontSize:9,borderRadius:4,padding:'2px 7px',letterSpacing:1}}>{s.memories.length} memories active</span>}
      </div>
      <div style={{display:'flex',gap:8}}>
        <textarea value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&e.ctrlKey&&run()} placeholder="Enter query... (Ctrl+Enter to send)" style={{flex:1,background:'rgba(0,0,0,.3)',border:'1px solid rgba(124,58,237,.2)',borderRadius:6,color:'#e2e8f0',padding:'9px 12px',fontSize:13,resize:'vertical',minHeight:56,outline:'none'}}/>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <button onClick={run} style={{padding:'0 16px',background:'rgba(124,58,237,.15)',border:'1px solid #7c3aed44',borderRadius:6,color:'#7c3aed',cursor:'pointer',fontSize:12,height:36}}>QUERY</button>
          {supported&&<button onClick={start} style={{padding:'0 10px',background:listening?'rgba(239,68,68,.2)':'rgba(0,212,255,.08)',border:`1px solid ${listening?'#ef444466':'rgba(0,212,255,.2)'}`,borderRadius:6,color:listening?'#ef4444':'#475569',cursor:'pointer',fontSize:13,height:36}} title="Voice input">🎤</button>}
        </div>
      </div>
      {!hasKey&&<div style={{color:'#f59e0b',fontSize:12}}>⚠ Add API keys in Config.</div>}
      <div style={{display:'flex',gap:10,flex:1,overflow:'hidden',minHeight:0}}>
        {Object.entries(MODELS).map(([k,m])=>(
          <div key={k} style={{flex:1,border:`1px solid ${m.c}22`,borderRadius:8,padding:12,background:`${m.c}06`,display:'flex',flexDirection:'column',gap:7,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <span style={{color:m.c,fontSize:15}}>{m.icon}</span>
              <span style={{color:m.c,fontSize:11,fontWeight:700,letterSpacing:2}}>{m.name}</span>
              {loading[k]&&<span style={{color:'#64748b',fontSize:9,marginLeft:'auto',animation:'flicker .5s infinite'}}>{streaming[k]?'STREAMING...':'THINKING...'}</span>}
            </div>
            <Viz active={!!loading[k]} color={m.c}/>
            {errs[k]&&<div style={{color:'#ef4444',fontSize:12}}>⚠ {errs[k]}</div>}
            <div style={{color:'#cbd5e1',fontSize:12,lineHeight:1.7,flex:1,overflowY:'auto',whiteSpace:'pre-wrap'}}>
              {texts[k]||(!loading[k]&&!errs[k]&&<span style={{color:'#1e3a5f'}}>Awaiting query...</span>)}
              {streaming[k]&&<span style={{animation:'cursor-blink .7s infinite',color:m.c}}>█</span>}
            </div>
          </div>
        ))}
      </div>
      {done&&Object.values(texts).some(t=>t)&&(
        <div style={{border:'1px solid rgba(124,58,237,.2)',borderRadius:8,padding:14,background:'rgba(124,58,237,.04)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{color:'#7c3aed',fontSize:11,letterSpacing:2,fontWeight:700}}>◈ ORBIS SYNTHESIS</span>
            <div style={{flex:1,height:3,background:'#1e293b',borderRadius:2}}>
              <div style={{height:'100%',borderRadius:2,width:`${score}%`,background:score>70?'#00ff88':score>40?'#f59e0b':'#ef4444',transition:'width 1.2s',boxShadow:`0 0 6px ${score>70?'#00ff88':score>40?'#f59e0b':'#ef4444'}88`}}/>
            </div>
            <span style={{color:score>70?'#00ff88':score>40?'#f59e0b':'#ef4444',fontSize:11,fontWeight:700}}>{score}%</span>
          </div>
          {cf.length>0&&(
            <div style={{background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.15)',borderRadius:5,padding:9,marginBottom:9}}>
              <div style={{color:'#ef4444',fontSize:10,letterSpacing:2,marginBottom:5}}>⚠ CONFLICT ANALYSIS</div>
              {cf.map((c,i)=><div key={i} style={{color:'#fca5a5',fontSize:11,marginBottom:2}}>• {c}</div>)}
            </div>
          )}
          <div style={{color:'#94a3b8',fontSize:12,lineHeight:1.7}}>
            {cf.length===0?<span style={{color:'#00ff88'}}>✓ All models converge. High confidence recommendation.</span>:`${cf.length} conflict(s) detected — review divergences before acting.`}
            {ragInfo.active&&<span style={{color:'#475569',fontSize:11}}> · Response informed by {ragInfo.count} knowledge base source(s).</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── GRAPH ─────────────────────────────────────────────────────────────────────
const NODE_C={note:'#f59e0b',keyword:'#00d4ff',synthesis:'#7c3aed'};
function Graph() {
  const {s}=use(); const svgRef=useRef(); const [focusId,setFocus]=useState(null); const [tip,setTip]=useState(null);
  useEffect(()=>{
    const svg=d3.select(svgRef.current); if(!svgRef.current) return;
    const W=svgRef.current.clientWidth||700, H=svgRef.current.clientHeight||500;
    svg.selectAll('*').remove();
    const defs=svg.append('defs');
    const gf=defs.append('filter').attr('id','glow'); gf.append('feGaussianBlur').attr('stdDeviation','4').attr('result','cb'); const fm=gf.append('feMerge'); fm.append('feMergeNode').attr('in','cb'); fm.append('feMergeNode').attr('in','SourceGraphic');
    defs.append('filter').attr('id','blur').append('feGaussianBlur').attr('stdDeviation','3');
    const g=svg.append('g');
    svg.call(d3.zoom().scaleExtent([.3,3]).on('zoom',e=>g.attr('transform',e.transform)));
    const nodes=s.graphNodes; const links=s.graphLinks;
    if(!nodes.length){svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#1e3a5f').attr('font-family','monospace').attr('font-size',13).text('Create notes to build your knowledge graph');return;}
    const nm=new Map(nodes.map(n=>[n.id,{...n,x:W/2+(Math.random()-.5)*200,y:H/2+(Math.random()-.5)*200}]));
    const sn=[...nm.values()];
    const sl=links.map(l=>({source:nm.get(typeof l.source==='object'?l.source.id:l.source),target:nm.get(typeof l.target==='object'?l.target.id:l.target)})).filter(l=>l.source&&l.target);
    const sim=d3.forceSimulation(sn).force('link',d3.forceLink(sl).id(d=>d.id).distance(80)).force('charge',d3.forceManyBody().strength(-200)).force('center',d3.forceCenter(W/2,H/2)).force('col',d3.forceCollide(20));
    const link=g.append('g').selectAll('line').data(sl).join('line').attr('stroke','rgba(0,212,255,.15)').attr('stroke-width',1);
    const node=g.append('g').selectAll('g').data(sn).join('g').attr('cursor','pointer')
      .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
      .on('click',(e,d)=>setFocus(p=>p===d.id?null:d.id))
      .on('mouseover',(e,d)=>setTip({x:e.offsetX,y:e.offsetY,label:d.label,type:d.type||'note',updated:d.updated}))
      .on('mouseleave',()=>setTip(null));
    node.append('circle').attr('r',d=>(d.size||6)+(d.type!=='keyword'?4:0)).attr('fill',d=>`${NODE_C[d.type]||NODE_C.note}22`).attr('stroke',d=>NODE_C[d.type]||NODE_C.note).attr('stroke-width',1.5).attr('filter','url(#glow)');
    node.each(function(d){const fr=d.updated?Math.max(0,1-(Date.now()-d.updated)/(86400000)):0;if(fr>.3)d3.select(this).append('circle').attr('r',(d.size||6)+10+fr*8).attr('fill','none').attr('stroke',NODE_C[d.type]||NODE_C.note).attr('stroke-width',.5).attr('opacity',fr*.4).attr('filter','url(#glow)');});
    node.append('text').text(d=>d.label?.slice(0,20)).attr('fill',d=>NODE_C[d.type]||NODE_C.note).attr('font-size',d=>d.type==='keyword'?9:11).attr('font-family','monospace').attr('text-anchor','middle').attr('dy',d=>(d.size||6)+14).attr('opacity',.8);
    sim.on('tick',()=>{
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('transform',d=>`translate(${d.x},${d.y})`);
      if(focusId){node.attr('filter',d=>d.id===focusId?'url(#glow)':'url(#blur)').attr('opacity',d=>d.id===focusId?1:.2);link.attr('opacity',d=>(d.source.id===focusId||d.target.id===focusId)?.6:.05);}
      else{node.attr('filter','url(#glow)').attr('opacity',1);link.attr('opacity',1);}
    });
    return()=>sim.stop();
  },[s.graphNodes,s.graphLinks,focusId]);
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <span style={{color:'#00ff88',fontSize:12,letterSpacing:2,fontWeight:700}}>◎ KNOWLEDGE GRAPH</span>
        <span style={{color:'#334155',fontSize:11}}>{s.graphNodes.length} nodes · {s.graphLinks.length} links</span>
        {focusId&&<button onClick={()=>setFocus(null)} style={{marginLeft:'auto',background:'rgba(0,255,136,.1)',border:'1px solid rgba(0,255,136,.2)',borderRadius:4,color:'#00ff88',cursor:'pointer',padding:'3px 9px',fontSize:10}}>CLEAR FOCUS</button>}
      </div>
      <div style={{display:'flex',gap:14,fontSize:10,color:'#64748b'}}>
        {Object.entries(NODE_C).map(([t,c])=><div key={t} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:7,height:7,borderRadius:'50%',background:c,boxShadow:`0 0 5px ${c}`}}/>{t.toUpperCase()}</div>)}
        <span style={{marginLeft:'auto',color:'#1e3a5f'}}>Drag · Scroll zoom · Click focus</span>
      </div>
      <div style={{flex:1,position:'relative',border:'1px solid rgba(0,255,136,.1)',borderRadius:8,overflow:'hidden'}}>

const MOODS=[{e:'🔥',v:5},{e:'⚡',v:4},{e:'💧',v:3},{e:'🌧️',v:2},{e:'💀',v:1}];
function streak(js) {
  if(!js.length) return 0;
  const sorted=[...js].sort((a,b)=>b.date.localeCompare(a.date));
  let str=0, cur=new Date(); cur.setHours(0,0,0,0);
  for(const j of sorted){const dv=new Date(j.date);dv.setHours(0,0,0,0);if(Math.round((cur-dv)/86400000)<=1){str++;cur=dv;}else break;}
  return str;
}
function MoodChart({journals}) {
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d'); const W=c.width, H=c.height;
    ctx.clearRect(0,0,W,H);
    const days=[];
    for(let i=29;i>=0;i--){
      const dt=new Date(); dt.setDate(dt.getDate()-i);
      const key=dt.toISOString().slice(0,10);
      const entry=journals.find(j=>j.date===key);
      days.push({mood:entry?entry.mood||3:null});
    }
    for(let v=1;v<=5;v++){
      const y=H-(v/5)*(H-8)-4;
      ctx.strokeStyle='rgba(236,72,153,.08)'; ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    const pts=days.map((d,i)=>d.mood!==null?{x:(i/29)*(W-16)+8,y:H-(d.mood/5)*(H-8)-4}:null);
    const valid=pts.filter(Boolean);
    if(valid.length<2){
      ctx.fillStyle='#1e3a5f'; ctx.font='9px monospace'; ctx.textAlign='center';
      ctx.fillText('No data yet',W/2,H/2); return;
    }
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#7c3aed'); grad.addColorStop(1,'#ec4899');
    ctx.beginPath(); let first=true;
    pts.forEach(p=>{
      if(!p){first=true;return;}
      if(first){ctx.moveTo(p.x,p.y);first=false;}else ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle=grad; ctx.lineWidth=1.5;
    ctx.shadowBlur=6; ctx.shadowColor='#ec4899'; ctx.stroke(); ctx.shadowBlur=0;
    valid.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle='#ec4899';ctx.fill();});
  },[journals]);
  return <canvas ref={ref} width={168} height={56} style={{width:'100%',height:56,borderRadius:4,marginTop:6}}/>;
}

// ── 3D ORB ROOM ───────────────────────────────────────────────────────────────
const ORB3D=[
  {id:'advisor',l:'ADVISOR',c:0x7c3aed,p:[-3,1.5,0]},{id:'graph',l:'GRAPH',c:0x00ff88,p:[3,1.5,0]},
  {id:'notes',  l:'NOTES',  c:0xf59e0b,p:[-2,-1.5,1]},{id:'journal',l:'JOURNAL',c:0xec4899,p:[2,-1.5,1]},
  {id:'goals',  l:'GOALS',  c:0xf97316,p:[0,2.5,-1]}, {id:'agents', l:'AGENTS', c:0xa855f7,p:[0,-2.5,-1]},
];
function Room3D() {
  const mount=useRef(); const {d}=use();
  useEffect(()=>{
    const el=mount.current; if(!el) return;
    const {Scene,PerspectiveCamera,WebGLRenderer,AmbientLight,PointLight,SphereGeometry,MeshPhongMaterial,MeshBasicMaterial,TorusGeometry,Mesh,Points,BufferGeometry,BufferAttribute,PointsMaterial,GridHelper,Raycaster,Vector2,Vector3,FogExp2,Sprite,SpriteMaterial,CanvasTexture,Clock}=THREE;
    const scene=new Scene(); scene.fog=new FogExp2(0x050510,.12);
    const cam=new PerspectiveCamera(60,el.clientWidth/el.clientHeight,.1,100); cam.position.set(0,0,8);
    const ren=new WebGLRenderer({antialias:true,alpha:true}); ren.setPixelRatio(devicePixelRatio); ren.setSize(el.clientWidth,el.clientHeight); ren.setClearColor(0x050510,1); el.appendChild(ren.domElement);
    scene.add(new AmbientLight(0x111133,2));
    const pl=new PointLight(0x00d4ff,3,20); scene.add(pl);
    const core=new Mesh(new SphereGeometry(.7,32,32),new MeshPhongMaterial({color:0x00d4ff,emissive:0x003344,transparent:true,opacity:.85})); scene.add(core);
    const ring=new Mesh(new TorusGeometry(1.1,.01,8,60),new MeshBasicMaterial({color:0x00d4ff,transparent:true,opacity:.3})); ring.rotation.x=Math.PI/2; scene.add(ring);
    const meshes=[];
    ORB3D.forEach(def=>{
      const m=new Mesh(new SphereGeometry(.4,24,24),new MeshPhongMaterial({color:def.c,emissive:def.c,emissiveIntensity:.3,transparent:true,opacity:.9}));
      m.position.set(...def.p); m.userData={id:def.id,bp:[...def.p]}; scene.add(m); meshes.push(m);
      const halo=new Mesh(new SphereGeometry(.55,16,16),new MeshBasicMaterial({color:def.c,transparent:true,opacity:.08,side:THREE.BackSide})); halo.position.set(...def.p); scene.add(halo);
      const cv=document.createElement('canvas'); cv.width=256;cv.height=64;
      const cx=cv.getContext('2d'); cx.fillStyle=`#${def.c.toString(16).padStart(6,'0')}`; cx.font='bold 28px monospace'; cx.textAlign='center'; cx.fillText(def.l,128,42);
      const sp=new Sprite(new SpriteMaterial({map:new CanvasTexture(cv),transparent:true,opacity:.85})); sp.scale.set(1.4,.35,1); sp.position.set(def.p[0],def.p[1]-.65,def.p[2]); scene.add(sp);
    });
    const pa=new Float32Array(600*3); for(let i=0;i<600*3;i++) pa[i]=(Math.random()-.5)*20;
    const pg=new BufferGeometry(); pg.setAttribute('position',new BufferAttribute(pa,3));
    scene.add(new Points(pg,new PointsMaterial({color:0x00d4ff,size:.03,transparent:true,opacity:.4})));
    scene.add(new GridHelper(20,30,0x001a2e,0x001a2e));
    const mouse={x:0,y:0}; const ray=new Raycaster(); const mv=new Vector2();
    const onMove=e=>{const r=el.getBoundingClientRect();mouse.x=((e.clientX-r.left)/r.width-.5)*2;mouse.y=-((e.clientY-r.top)/r.height-.5)*2;mv.set(mouse.x,mouse.y);};
    const onClick=e=>{const r=el.getBoundingClientRect();mv.set(((e.clientX-r.left)/r.width-.5)*2,-((e.clientY-r.top)/r.height-.5)*2);ray.setFromCamera(mv,cam);const h=ray.intersectObjects(meshes);if(h.length)d({type:'NAV',v:h[0].object.userData.id});};
    const onResize=()=>{cam.aspect=el.clientWidth/el.clientHeight;cam.updateProjectionMatrix();ren.setSize(el.clientWidth,el.clientHeight);};
    el.addEventListener('mousemove',onMove); el.addEventListener('click',onClick); window.addEventListener('resize',onResize);
    const clk=new Clock(); let raf;
    const animate=()=>{
      raf=requestAnimationFrame(animate); const t=clk.getElapsedTime();
      cam.position.x+=(mouse.x*2-cam.position.x)*.02; cam.position.y+=(mouse.y*1-cam.position.y)*.02; cam.lookAt(0,0,0);
      core.scale.setScalar(Math.sin(t*1.5)*.05+1); ring.rotation.z=t*.3; ring.rotation.y=t*.1;
      ray.setFromCamera(mv,cam); const hits=ray.intersectObjects(meshes); const hov=hits.length?hits[0].object:null;
      meshes.forEach((o,i)=>{o.position.y=o.userData.bp[1]+Math.sin(t*.8+i*1.2)*.15;const ts=o===hov?1.25:1;o.scale.lerp(new Vector3(ts,ts,ts),.1);o.material.emissiveIntensity+=(o===hov?.6:.3-o.material.emissiveIntensity)*.1;});
      pl.position.set(Math.sin(t*.5)*2,Math.cos(t*.4)*1,Math.sin(t*.3)*2);
      ren.render(scene,cam);
    };
    animate();
    return()=>{cancelAnimationFrame(raf);el.removeEventListener('mousemove',onMove);el.removeEventListener('click',onClick);window.removeEventListener('resize',onResize);ren.dispose();if(el.contains(ren.domElement))el.removeChild(ren.domElement);};
  },[]);
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:9}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <span style={{color:'#38bdf8',fontSize:12,letterSpacing:2,fontWeight:700}}>⊕ 3D ORB ROOM</span>
        <span style={{color:'#334155',fontSize:11}}>Mouse to look · Click orb to navigate</span>
      </div>
      <div ref={mount} style={{flex:1,borderRadius:8,overflow:'hidden',border:'1px solid rgba(56,189,248,.15)',cursor:'crosshair'}}/>
    </div>
  );
}

      <Sidebar/>
      <main style={{position:'relative',zIndex:10,marginLeft:68,height:'100vh',display:'flex',flexDirection:'column'}}>
        <div style={{height:42,borderBottom:'1px solid rgba(0,212,255,.06)',display:'flex',alignItems:'center',paddingInline:18,gap:11,background:'rgba(5,5,16,.7)',backdropFilter:'blur(10px)',flexShrink:0}}>
          <span style={{background:'linear-gradient(135deg,#00d4ff,#7c3aed)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontWeight:900,letterSpacing:4,fontSize:12}}>ORBIS</span>
          <span style={{color:'#1e3a5f',fontSize:10}}>|</span>
          <span style={{color:nav?.c||'#334155',fontSize:10,letterSpacing:2}}>{nav?.l}</span>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setPalette(true)} style={{background:'rgba(0,212,255,.07)',border:'1px solid rgba(0,212,255,.15)',borderRadius:4,color:'#475569',cursor:'pointer',padding:'2px 8px',fontSize:9,letterSpacing:1}}>⌘K</button>
            {s.memories.length>0&&<span style={{color:'#f59e0b',fontSize:9,letterSpacing:1}}>{s.memories.length} MEM</span>}
            <div style={{width:5,height:5,borderRadius:'50%',background:'#00ff88',boxShadow:'0 0 5px #00ff88'}}/>
            <span style={{color:'#334155',fontSize:9,letterSpacing:2}}>ALL SYSTEMS NOMINAL</span>
          </div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:20}}>
          {pages[s.module]||<Home/>}
        </div>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Provider><App/></Provider>
);
</script>
</body>
</html>
